name: CI

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13", "3.14"]

    steps:
      - uses: actions/checkout@v5
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Display Python version
        run: python -c "import sys; print(sys.version)"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Test with pytest
        run: |
          pip install pytest pytest-cov
          pytest --junitxml=coverage/junit/test-results.xml --cov=egaugepolling --cov-report=xml --cov-report=html
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            **/coverage/**

  build_images:
    runs-on: ubuntu-latest
    name: Build and push images
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build egaugepolling image
        uses: docker/build-push-action@v6.5.0
        with:
          context: .
          file: ./docker/polling/Dockerfile
          tags: ghcr.io/blazingneutron/egauge-polling:${{ github.sha }},ghcr.io/blazingneutron/egauge-polling:latest
          push: true
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}:latest
          cache-to: type=inline
      - name: Build mock-egauge image
        uses: docker/build-push-action@v6.5.0
        with:
          context: .
          file: ./docker/mockegauge/Dockerfile
          tags: ghcr.io/blazingneutron/mock-egauge:${{ github.sha }},ghcr.io/blazingneutron/mock-egauge:latest
          push: true
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}:latest
          cache-to: type=inline
